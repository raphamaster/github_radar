<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1F3A"/>
      <stop offset="1" stop-color="#102A4C"/>
    </linearGradient>
    <linearGradient id="mintline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3DDC97"/>
      <stop offset="1" stop-color="#2BB67C"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3DDC97" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3DDC97" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#3DDC97" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#3DDC97" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- fundo -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- grade sutil -->
  <g stroke="#FFFFFF" stroke-opacity="0.03">
    <path d="M0 105H1200 M0 210H1200 M0 315H1200 M0 420H1200 M0 525H1200"/>
    <path d="M150 0V630 M300 0V630 M450 0V630 M600 0V630 M750 0V630 M900 0V630 M1050 0V630"/>
  </g>

  <rect x="0" y="0" width="1200" height="6" fill="url(#mintline)"/>

  <!-- ===== RADAR (lado direito) ===== -->
  <g transform="translate(930,315)">
    <!-- anéis -->
    <circle r="220" fill="none" stroke="#22456E" stroke-width="1.5"/>
    <circle r="165" fill="none" stroke="#22456E" stroke-width="1.5"/>
    <circle r="110" fill="none" stroke="#2A5384" stroke-width="1.5"/>
    <circle r="55"  fill="none" stroke="#2A5384" stroke-width="1.5"/>
    <!-- cruz -->
    <line x1="-220" y1="0" x2="220" y2="0" stroke="#22456E" stroke-width="1"/>
    <line x1="0" y1="-220" x2="0" y2="220" stroke="#22456E" stroke-width="1"/>
    <!-- varredura -->
    <path d="M0 0 L220 0 A220 220 0 0 0 110 -190.5 Z" fill="url(#sweep)"/>
    <line x1="0" y1="0" x2="220" y2="0" stroke="#3DDC97" stroke-width="2.5"/>
    <!-- blips (repositórios detectados) -->
    <circle cx="78" cy="-95" r="7" fill="#3DDC97"/>
    <circle cx="78" cy="-95" r="13" fill="none" stroke="#3DDC97" stroke-opacity="0.4" stroke-width="2"/>
    <circle cx="-120" cy="60" r="6" fill="#E6C24A"/>
    <circle cx="45" cy="130" r="5" fill="#BFD4E6"/>
    <circle cx="-60" cy="-150" r="5" fill="#3DDC97" fill-opacity="0.7"/>
    <circle cx="160" cy="80" r="5" fill="#E8A865"/>
    <!-- centro -->
    <circle r="9" fill="#3DDC97"/>
    <!-- mini octocat-like node tags -->
    <g font-family="Courier, monospace" font-size="12" fill="#8FA8BF">
      <text x="92" y="-100">repo/a</text>
      <text x="-108" y="84">repo/b</text>
      <text x="58" y="152">repo/c</text>
    </g>
  </g>

  <!-- ===== TEXTO (lado esquerdo) ===== -->
  <rect x="80" y="92" width="166" height="36" rx="18" fill="none" stroke="#3DDC97" stroke-width="1.5"/>
  <text x="163" y="116" font-family="Helvetica, Arial, sans-serif" font-size="16" letter-spacing="3" fill="#3DDC97" text-anchor="middle">ANALYTICS</text>

  <text x="80" y="215" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="76" fill="#FFFFFF">GitHub Radar</text>
  <text x="80" y="266" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#BFD4E6">API GitHub&#160;&#160;&#8594;&#160;&#160;Python ETL&#160;&#160;&#8594;&#160;&#160;Power BI</text>

  <!-- métricas em destaque -->
  <g font-family="Helvetica, Arial, sans-serif">
    <g transform="translate(80,320)">
      <rect width="180" height="78" rx="10" fill="#16304F" stroke="#3DDC97" stroke-opacity="0.45"/>
      <text x="16" y="30" font-size="14" fill="#8FA8BF">Atividade</text>
      <text x="16" y="58" font-size="20" font-weight="bold" fill="#FFFFFF">Commits &#8226; MM7</text>
    </g>
    <g transform="translate(276,320)">
      <rect width="180" height="78" rx="10" fill="#16304F" stroke="#3DDC97" stroke-opacity="0.45"/>
      <text x="16" y="30" font-size="14" fill="#8FA8BF">Concentra&#231;&#227;o</text>
      <text x="16" y="58" font-size="20" font-weight="bold" fill="#FFFFFF">Bus Factor</text>
    </g>
    <g transform="translate(80,412)">
      <rect width="180" height="78" rx="10" fill="#16304F" stroke="#3DDC97" stroke-opacity="0.45"/>
      <text x="16" y="30" font-size="14" fill="#8FA8BF">Processo</text>
      <text x="16" y="58" font-size="20" font-weight="bold" fill="#FFFFFF">Lead Time P95</text>
    </g>
    <g transform="translate(276,412)">
      <rect width="180" height="78" rx="10" fill="#16304F" stroke="#3DDC97" stroke-opacity="0.45"/>
      <text x="16" y="30" font-size="14" fill="#8FA8BF">Linguagens</text>
      <text x="16" y="58" font-size="20" font-weight="bold" fill="#FFFFFF">% por Stack</text>
    </g>
  </g>

  <!-- badges -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="15">
    <rect x="80" y="538" width="104" height="32" rx="16" fill="#16304F" stroke="#3DDC97" stroke-opacity="0.5"/>
    <text x="132" y="559" fill="#BFD4E6" text-anchor="middle">Power BI</text>
    <rect x="196" y="538" width="92" height="32" rx="16" fill="#16304F" stroke="#3DDC97" stroke-opacity="0.5"/>
    <text x="242" y="559" fill="#BFD4E6" text-anchor="middle">Python</text>
    <rect x="300" y="538" width="74" height="32" rx="16" fill="#16304F" stroke="#3DDC97" stroke-opacity="0.5"/>
    <text x="337" y="559" fill="#BFD4E6" text-anchor="middle">DAX</text>
    <rect x="386" y="538" width="86" height="32" rx="16" fill="#16304F" stroke="#3DDC97" stroke-opacity="0.5"/>
    <text x="429" y="559" fill="#BFD4E6" text-anchor="middle">Figma</text>
  </g>

  <!-- assinatura -->
  <text x="1120" y="585" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#3DDC97" text-anchor="end" font-weight="bold">raphaelfranco.com</text>

  <rect x="0" y="624" width="1200" height="6" fill="url(#mintline)"/>
</svg>
